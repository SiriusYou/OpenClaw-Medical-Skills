name: Validate skill

on:
  push:
    paths:
      - "skills/*/SKILL.md"
  pull_request:
    paths:
      - "skills/*/SKILL.md"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - name: Validate SKILL.md files
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Base: $BASE_SHA"
          echo "Head: $HEAD_SHA"

          DIFF=$(git diff --name-status "$BASE_SHA" "$HEAD_SHA" -- 'skills/*/SKILL.md' || true)

          if [ -z "$DIFF" ]; then
            exit 0
          fi

          # Check for deleted skills
          DELETED_FILES=$(echo "$DIFF" | awk '$1 ~ /^D/ {print $2}')

          PARTIAL_DELETE_FOLDERS=""
          FULL_DELETE_FOLDERS=""

          if [ -n "$DELETED_FILES" ]; then
            while IFS= read -r p; do
              [ -z "$p" ] && continue
              folder=$(echo "$p" | awk -F/ '{print $1"/"$2}')
              if [ -d "$folder" ]; then
                PARTIAL_DELETE_FOLDERS="${PARTIAL_DELETE_FOLDERS}"$'\n'"$folder"
              else
                FULL_DELETE_FOLDERS="${FULL_DELETE_FOLDERS}"$'\n'"$folder"
              fi
            done <<< "$DELETED_FILES"

            PARTIAL_DELETE_FOLDERS=$(echo "$PARTIAL_DELETE_FOLDERS" | sed '/^$/d' | sort -u)
            FULL_DELETE_FOLDERS=$(echo "$FULL_DELETE_FOLDERS" | sed '/^$/d' | sort -u)

            if [ -n "$FULL_DELETE_FOLDERS" ]; then
              FULL_COUNT=$(echo "$FULL_DELETE_FOLDERS" | wc -l | tr -d ' ')
              echo ""
              echo "$FULL_COUNT skills have been deleted (folder missing in HEAD), as listed in:"
              echo "$FULL_DELETE_FOLDERS"
              echo ""
            fi

            if [ -n "$PARTIAL_DELETE_FOLDERS" ]; then
              PARTIAL_COUNT=$(echo "$PARTIAL_DELETE_FOLDERS" | wc -l | tr -d ' ')
              echo ""
              echo "[ERROR] $PARTIAL_COUNT skills have SKILL.md deleted but folder still exists in HEAD. Please delete the whole folder or restore SKILL.md:"
              echo "$PARTIAL_DELETE_FOLDERS"
              echo ""
              exit 1
            fi
          fi

          # Validate skills that were added or modified
          CHANGED_FILES=$(echo "$DIFF" | awk '
            $1 ~ /^A/ {print $2}
            $1 ~ /^M/ {print $2}
            $1 ~ /^R/ {print $3}
          ')

          if [ -z "$CHANGED_FILES" ]; then
            exit 0
          fi

          echo "Validating:"
          echo "$CHANGED_FILES"

          INVALID_COUNT=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ ! -f "$f" ]; then
              echo "[SKIP] missing file: $f"
              continue
            fi
            if ! python scripts/check_skill_md.py "$f"; then
              INVALID_COUNT=$((INVALID_COUNT + 1))
            fi
          done <<< "$CHANGED_FILES"

          echo ""
          echo "$INVALID_COUNT skills failed validation."

          if [ "$INVALID_COUNT" -ne 0 ]; then
            exit 1
          fi

          exit 0